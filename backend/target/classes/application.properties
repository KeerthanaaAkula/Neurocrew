# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource (in-memory H2)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT
app.jwt.secret=replace_me_change_this_to_a_long_random_secret_for_production_please_12345
app.jwt.expiration=3600000

# Resume upload directory (created automatically by ProfileService)
app.upload.dir=uploads/resumes

# Multipart uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
